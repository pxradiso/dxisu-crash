<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>osu!dxisu - We're on it!</title>
  <link rel="icon" href="./images/icon1.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: hsl(250.9091, 18.6441%, 11.5686%);
      color: hsl(250.0000, 36.0000%, 90.1961%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background-color: hsl(251.25, 20%, 15.6863%);
      border: 1px solid hsl(252, 18.5185%, 21.1765%);
      border-radius: 0.75rem;
      padding: 3rem 3.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 1px 2px 5px 1px hsl(0 0% 0% / 0.15);
    }

    .branding {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }

    .brand-name {
      font-size: 1.4rem;
      font-weight: 700;
      color: hsl(250.0000, 36.0000%, 90.1961%);
      letter-spacing: -0.01em;
    }

    .brand-name span {
      color: hsl(263.0769, 32.5000%, 68.6275%);
    }

    .badge {
      display: inline-block;
      background-color: hsl(0, 25%, 18%);
      color: hsl(0, 68.6747%, 67.4510%);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.85rem;
      border-radius: 999px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.875rem;
      font-weight: 700;
      color: hsl(250.0000, 36.0000%, 90.1961%);
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    h1 span {
      color: hsl(263.0769, 32.5000%, 68.6275%);
    }

    p {
      font-size: 0.95rem;
      font-weight: 300;
      color: hsl(258.9474, 10.3825%, 64.1176%);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .divider {
      width: 100%;
      height: 1px;
      background-color: hsl(252, 18.5185%, 21.1765%);
      margin: 1.5rem 0;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: hsl(258.9474, 10.3825%, 64.1176%);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: hsl(0, 68.6747%, 67.4510%);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.8); }
    }

    .discord-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      background-color: hsl(235, 85.6%, 64.7%);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.6rem 1.4rem;
      border-radius: 0.5rem;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .discord-btn:hover {
      opacity: 0.85;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: hsl(258.9474, 10.3825%, 64.1176%);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="branding">
      <img class="logo" src="./images/logo.png" alt="osu!dxisu logo" onerror="this.style.display='none'" />
      <span class="brand-name">osu!<span>dxisu</span></span>
    </div>

    <div class="badge">⚠ Outage</div>

    <h1>Something went <span>wrong</span></h1>

    <p>
      osu!dxisu has unexpectedly crashed and we're currently working on a fix.<br />
      We're sorry for the inconvenience. We'll be back as soon as possible.
    </p>

    <div class="divider"></div>

    <div class="status-row">
      <div class="status-dot"></div>
      <span>Fix in progress</span>
    </div>

    <a class="discord-btn" href="https://discord.gg/YOUR_INVITE" target="_blank">
    <svg width="18" height="18" viewBox="0 0 127.14 96.36" fill="currentColor">
     <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
     </svg>
      Join Discord for updates
    </a>

  </div>

  <footer>© 2024 - 2026 osu!dxisu - dxisu.it</footer>
</body>
</html>
